<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade: Chart.js</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="display: flex;">
    <div>
        <canvas id="myChart" style="position: relative; height:40vh; width:40vw"></canvas>
    </div>

    <div>
        <canvas id="myChart2" style="position: relative; height:40vh; width:40vw"></canvas>
    </div>
</body>




<script>

// Gráfico de linha
    const labels =['12:00', '13:00', '14:00', '15:00', '16:00', '17:00'];
const data = {
  labels: labels,
  datasets: [
    {
    label: 'Temperatura',
    data: [30, 29, 28, 25, 22, 23],
    fill: false,
    borderColor: 'rgb(255, 0, 0)',
    tension: 0.1
  },{
    label: 'Umidade',
    data: [80, 82, 80, 85, 80, 83],
    fill: false,
    borderColor: 'rgb(75, 192, 192)',
    tension: 0.1
  }]
};

// config gráfico de linha
const config = {
  type: 'line',
  data: data,
};

</script>

<script>
    // variavel pra conseguir colocar o gráfico no canvas dentro da div
    const myChart = new Chart (document.getElementById('myChart'),
    config );
</script>




<script>

  const ctx2 = document.getElementById('myChart2');

  new Chart(ctx2, {
    type: 'bar',
    data: {
      labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'],
      datasets: [
        {
        label: 'Temperatura média',
        data: [22, 24, 27, 23, 20, 18],
        borderWidth: 1
      },
      {
        label: 'Umidade média',
        data: [90, 89, 93, 87, 88, 82],
        borderWidth: 1
      }]
    },
    options: {
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });

</script>


</html>
